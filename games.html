<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Games — HasPetTree</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .games-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .game-card {
      background: #161b22;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.25rem 1rem;
      text-align: center;
      text-decoration: none;
      color: #e6edf3;
      font-weight: 600;
      font-size: 0.95rem;
      transition: transform 0.15s ease, filter 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .game-card:hover {
      transform: translateY(-2px);
      filter: brightness(1.15);
    }
    .game-card .emoji {
      font-size: 2rem;
    }
    .coming-soon {
      width: 100%;
      text-align: center;
      color: #7d8590;
      font-size: 0.9rem;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile">
      <div class="avatar">🎮</div>
      <h1>Browser Games</h1>
    </div>

    <p class="coming-soon">Games coming soon! Check back later.</p>

    <div class="links">
      <a href="index.html" class="btn about">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to Links
      </a>
    </div>
  </div>
</body>
</html>
