<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Games — HasPetTree</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .game-links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .btn-game {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.14);
      transition: background 0.15s, transform 0.15s;
    }
    .btn-game:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }
    .btn-game .game-icon {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      flex-shrink: 0;
      object-fit: contain;
    }
    .btn-game .game-name {
      flex: 1;
    }
    .btn-game .arrow {
      opacity: 0.5;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">
    <div class="tree">🕹️</div>
    <h1>Browser Games</h1>
    <p class="subtitle">Play directly in your browser</p>

    <div class="game-links">
      <a href="https://www.chess.com" class="btn-game" target="_blank" rel="noopener">
        <img class="game-icon" src="https://www.google.com/s2/favicons?domain=chess.com&sz=32" alt="Chess.com" />
        <span class="game-name">Chess.com</span>
        <span class="arrow">↗</span>
      </a>
      <a href="https://minesweeperonline.com" class="btn-game" target="_blank" rel="noopener">
        <img class="game-icon" src="https://www.google.com/s2/favicons?domain=minesweeperonline.com&sz=32" alt="Minesweeper Online" />
        <span class="game-name">Minesweeper Online</span>
        <span class="arrow">↗</span>
      </a>
      <a href="https://playsnake.org" class="btn-game" target="_blank" rel="noopener">
        <img class="game-icon" src="https://www.google.com/s2/favicons?domain=playsnake.org&sz=32" alt="Play Snake" />
        <span class="game-name">Play Snake</span>
        <span class="arrow">↗</span>
      </a>
      <a href="https://itch.io/games/platform-web" class="btn-game" target="_blank" rel="noopener">
        <img class="game-icon" src="https://www.google.com/s2/favicons?domain=itch.io&sz=32" alt="itch.io" />
        <span class="game-name">itch.io Web Games</span>
        <span class="arrow">↗</span>
      </a>
    </div>

    <div class="links-static back-row">
      <a href="index.html" class="btn muted">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to Links
      </a>
    </div>
  </div>
</body>
</html>
