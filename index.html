  <script>
    const wrapper = document.getElementById('linksWrapper');
    const track = document.getElementById('linksTrack');

    let isDown = false;
    let startX = 0;
    let startScroll = 0;
    let paused = false;
    let rafId = null;

    function halfWidth() {
      return track.scrollWidth / 2;
    }

    function autoScroll() {
      if (!paused) {
        wrapper.scrollLeft += 0.35;
        if (wrapper.scrollLeft >= halfWidth()) {
          wrapper.scrollLeft -= halfWidth();
        }
      }
      rafId = requestAnimationFrame(autoScroll);
    }

    rafId = requestAnimationFrame(autoScroll);

    /* Mouse drag */
    wrapper.addEventListener('mousedown', (e) => {
      isDown = true;
      paused = true;
      wrapper.classList.add('grabbing');
      startX = e.pageX;
      startScroll = wrapper.scrollLeft;
      e.preventDefault();
    });

    window.addEventListener('mouseup', () => {
      if (!isDown) return;
      isDown = false;
      paused = false;
      wrapper.classList.remove('grabbing');
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      const delta = startX - e.pageX;
      let next = startScroll + delta;
      const half = halfWidth();
      if (next >= half) next -= half;
      if (next < 0) next += half;
      wrapper.scrollLeft = next;
    });

    /* Touch swipe */
    wrapper.addEventListener('touchstart', (e) => {
      paused = true;
      startX = e.touches[0].pageX;
      startScroll = wrapper.scrollLeft;
    }, { passive: true });

    wrapper.addEventListener('touchmove', (e) => {
      const delta = startX - e.touches[0].pageX;
      let next = startScroll + delta;
      const half = halfWidth();
      if (next >= half) next -= half;
      if (next < 0) next += half;
      wrapper.scrollLeft = next;
    }, { passive: true });

    wrapper.addEventListener('touchend', () => {
      paused = false;
    });

    /* Mouse wheel */
    wrapper.addEventListener('wheel', (e) => {
      e.preventDefault();
      let next = wrapper.scrollLeft + e.deltaY * 0.6 + e.deltaX * 0.6;
      const half = halfWidth();
      if (next >= half) next -= half;
      if (next < 0) next += half;
      wrapper.scrollLeft = next;
    }, { passive: false });

    /* Prevent link clicks after a drag */
    wrapper.addEventListener('click', (e) => {
      if (Math.abs(wrapper.scrollLeft - startScroll) > 5) {
        e.preventDefault();
      }
    }, true);
  </script>
